service: desafio-api-pokedex

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 128
  timeout: 3
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:Scan
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
        Resource: 
          - arn:aws:dynamodb:${self:provider.region}:*:table/desafio-api-pokedex-treinadores-dev
          - arn:aws:dynamodb:${self:provider.region}:*:table/desafio-api-pokedex-pokemons-dev
  environment:
    TREINADORES_TABLE: desafio-api-pokedex-treinadores-dev
    POKEMONS_TABLE: desafio-api-pokedex-pokemons-dev

plugins:
  - serverless-offline
  - serverless-python-requirements

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
  pythonRequirements:
    dockerizePip: false

functions:
  - ${file(./src/controllers/functions.yml)}

